<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chat App</title>
<script src="https://js.puter.com/v2/"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>  
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/javascript.min.js"></script>
<style>
body {
  margin: 0;
  font-family: system-ui, -apple-system, Segoe UI, Roboto;
  background: #343541;
  color: #ececf1;
}

/* Layout */
.app {
  display: flex;
  height: 100vh;
}

/* Sidebar */
.sidebar {
  width: 260px;
  background: #202123;
  padding: 15px;
  border-right: 1px solid #2f3037;
}

.logo {
  font-size: 18px;
  margin-bottom: 20px;
  font-weight: bold;
}

.new-chat {
  background: #343541;
  border: 1px solid #565869;
  color: white;
  padding: 10px;
  border-radius: 6px;
  cursor: pointer;
}

/* Main area */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* Chat messages */
#chat {
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  flex: 1;
  padding-bottom: 40px;
}

.message {
  display: flex;
  justify-content: center;
  padding: 24px 0;
    animation: fadeIn 0.2s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(5px); }
  to { opacity: 1; transform: translateY(0); }
}
.message.bot {
  background: #444654;
}

.message.user {
  background: #343541;
}

.message-content {
  max-width: 850px;
  width: 100%;
  padding: 0 20px;
  line-height: 1.7;
  font-size: 15px;
}

/* Code block */
pre {
  background: #0d1117;
  padding: 16px;
  border-radius: 12px;
  overflow-x: auto;
  position: relative;
  margin: 16px auto;
  max-width: 100%;
  border: 1px solid #30363d;
}

/* Smooth scrollbar */
pre::-webkit-scrollbar {
  height: 6px;
}
pre::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 10px;
}
code {
  font-family: monospace;
  font-size: 14px;
}

.copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: #10a37f;
  border: none;
  color: white;
  padding: 5px 8px;
  font-size: 12px;
  cursor: pointer;
  border-radius: 4px;
}

/* Input area */
#inputArea {
  position: sticky;
  bottom: 0;
  padding: 15px;
  background: #40414f;
  border-top: 1px solid #2f3037;
  display: flex;
  align-items: center;
  gap: 10px;
}

textarea {
  flex: 1;
}

#inputArea button {
  flex-shrink: 0;
}

textarea {
  flex: 1;
  /* resize: none;
  padding: 12px;
  border-radius: 8px;
  border: none;
  background: #40414f;
  color: white;
  font-size: 14px; */
}

button {
  margin-left: 10px;
  padding: 10px 14px;
  background: #10a37f;
  border: none;
  border-radius: 6px;
  color: white;
  cursor: pointer;
}
  .message-content p {
  margin: 8px 0;
}
</style>
</head>

<body>

<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">Hasan AI</div>
    <button class="new-chat">+ New Chat</button>
  </aside>

  <!-- Main Chat -->
  <main class="main">
    <div id="chat"></div>

    <div id="inputArea">
      <textarea id="prompt" rows="1" placeholder="Send a message..."></textarea>
      <button onclick="sendMessage()">➤</button>
    </div>
  </main>

</div>

<script>
const chat = document.getElementById("chat");
const textarea = document.getElementById("prompt");

  document.querySelector(".new-chat").addEventListener("click", () => {
  // Clear chat
  chat.innerHTML = "";

  // Optional: reset input
  textarea.value = "";
  textarea.style.height = "auto";

  // Optional: add welcome message
  addMessage("Hello! How can I help you?", "bot");
});
// Auto resize
textarea.addEventListener("input", () => {
  textarea.style.height = "auto";
  textarea.style.height = textarea.scrollHeight + "px";
});

// Enter to send
textarea.addEventListener("keydown", function(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
function formatText(text) {
  return text
    .replace(/\n\n/g, "</p><p>")
    .replace(/\n/g, "<br>");
}

function addMessage(text, className) {
  const msg = document.createElement("div");
  msg.className = "message " + className;

  const inner = document.createElement("div");
  inner.className = "message-content";

  const codeRegex = /```(\w+)?\n([\s\S]*?)```|(<[^>]+>[\s\S]*?<\/[^>]+>)/g;

  let formatted = text.replace(codeRegex, (match, lang, code) => {
    return `
      </p>
      <pre>
        <button class="copy-btn">Copy</button>
        <code class="language-${lang || 'plaintext'}">${escapeHTML(code)}</code>
      </pre>
      <p>
    `;
  });

  formatted = "<p>" + formatText(formatted) + "</p>";

  inner.innerHTML = formatted;
  msg.appendChild(inner);
  chat.appendChild(msg);

  // Highlight
  msg.querySelectorAll("pre code").forEach((block) => {
    hljs.highlightElement(block);
  });

  // Copy button
  msg.querySelectorAll(".copy-btn").forEach(btn => {
    btn.onclick = function () {
      const code = this.nextElementSibling.textContent;
      navigator.clipboard.writeText(code);
      this.innerText = "Copied!";
      setTimeout(() => this.innerText = "Copy", 1500);
    };
  });

  chat.scrollTop = chat.scrollHeight;
}
function escapeHTML(str) {
  return str.replace(/[&<>'"]/g, tag => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    "'": '&#39;',
    '"': '&quot;'
  }[tag]));
}
async function sendMessage() {
  const textarea = document.getElementById("prompt");
  const prompt = textarea.value.trim();

  if (!prompt) return;

  addMessage(prompt, "user");
  textarea.value = "";
  textarea.style.height = "auto";

  const loadingMsg = document.createElement("div");
  loadingMsg.className = "message bot";
  loadingMsg.innerText = "Typing...";
  chat.appendChild(loadingMsg);

  try {
    const response = await puter.ai.chat(prompt);

    loadingMsg.remove();
    addMessage(response.message.content, "bot");

  } catch (err) {
    loadingMsg.innerText = "Error: " + err.message;
  }

  chat.scrollTop = chat.scrollHeight;
}
  hljs.configure({ ignoreUnescapedHTML: true });
</script>

</body>
</html>
