<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chat App</title>
<script src="https://js.puter.com/v2/"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #343541;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
#welcome {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  opacity: 0.8;
}

#welcome h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

#welcome p {
  font-size: 16px;
  color: #ccc;
}
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  max-width: 70%;
  margin-bottom: 15px;
  padding: 12px;
  border-radius: 8px;
  white-space: pre-wrap;
}

.user {
  background: #10a37f;
  align-self: flex-end;
  margin-left: auto;
}

.bot {
  background: #444654;
}

#inputArea {
  display: flex;
  padding: 15px;
  background: #40414f;
}

textarea {
  flex: 1;
  resize: none;
  padding: 10px;
  border-radius: 5px;
  border: none;
  font-size: 14px;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  background: #10a37f;
  border: none;
  border-radius: 5px;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="welcome">
  <h1>AI Assistant</h1>
  <p>Ask anything and get instant responses</p>
</div>

<div id="chat"></div>

<div id="inputArea">
  <textarea id="prompt" rows="2" placeholder="Send a message..."></textarea>
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");

function addMessage(text, className) {
  const msg = document.createElement("div");
  msg.className = "message " + className;
  msg.innerText = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  const textarea = document.getElementById("prompt");
  const prompt = textarea.value.trim();

  if (!prompt) return;

  // Hide welcome screen after first message
  document.getElementById("welcome").style.display = "none";

  addMessage(prompt, "user");
  textarea.value = "";

  const loadingMsg = document.createElement("div");
  loadingMsg.className = "message bot";
  loadingMsg.innerText = "Typing...";
  chat.appendChild(loadingMsg);

  try {
    const response = await puter.ai.chat(prompt);
    loadingMsg.innerText = response.message.content;
  } catch (err) {
    loadingMsg.innerText = "Error: " + err.message;
  }

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
