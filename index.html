<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chat App</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://js.puter.com/v2/"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #343541;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
  pre {
  background: #1e1e1e;
  padding: 12px;
  border-radius: 6px;
  overflow-x: auto;
  position: relative;
}

.copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: #10a37f;
  border: none;
  color: white;
  padding: 5px 8px;
  font-size: 12px;
  cursor: pointer;
  border-radius: 4px;
}
#welcome {
  position: absolute;
  top: 40%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  opacity: 0.8;
}

#welcome h1 {
  font-size: 32px;
  margin-bottom: 10px;
}

#welcome p {
  font-size: 16px;
  color: #ccc;
}
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  max-width: 70%;
  margin-bottom: 15px;
  padding: 12px;
  border-radius: 8px;
  white-space: pre-wrap;
max-height: 300px;
  overflow-y: auto;
  word-wrap: break-word;
  overflow-wrap: break-word;
}

.user {
  background: #10a37f;
  align-self: flex-end;
  margin-left: auto;
}

.bot {
  background: #444654;
}

#inputArea {
  display: flex;
  padding: 15px;
  background: #40414f;
}

textarea {
  flex: 1;
  resize: none;
  padding: 10px;
  border-radius: 5px;
  border: none;
  font-size: 14px;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  background: #10a37f;
  border: none;
  border-radius: 5px;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="welcome">
  <h1>Hasan AI Assistant</h1>
  <p>Ask anything and get instant responses</p>
</div>

<div id="chat"></div>

<div id="inputArea">
  <textarea id="prompt" rows="2" placeholder="Send a message..."></textarea>
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");

function addMessage(text, className) {
  const msg = document.createElement("div");
  msg.className = "message " + className;

  // Detect code blocks (```code```)
  const codeRegex = /```([\s\S]*?)```/g;

  let formatted = text.replace(codeRegex, (match, code) => {
    return `
      <pre>
        <button class="copy-btn">Copy</button>
        <code>${escapeHTML(code)}</code>
      </pre>
    `;
  });

  msg.innerHTML = formatted;

  chat.appendChild(msg);

  // Highlight code
  msg.querySelectorAll("pre code").forEach((block) => {
    hljs.highlightElement(block);
  });

  // Copy button logic
  msg.querySelectorAll(".copy-btn").forEach(btn => {
    btn.onclick = function () {
      const code = this.nextElementSibling.innerText;
      navigator.clipboard.writeText(code);
      this.innerText = "Copied!";
      setTimeout(() => this.innerText = "Copy", 1500);
    };
  });

  chat.scrollTop = chat.scrollHeight;
}
function escapeHTML(str) {
  return str.replace(/[&<>'"]/g, tag => ({
    '&': '&amp;',
    '<': '&lt;',
    '>': '&gt;',
    "'": '&#39;',
    '"': '&quot;'
  }[tag]));
}
async function sendMessage() {
  const textarea = document.getElementById("prompt");
  const prompt = textarea.value.trim();

  if (!prompt) return;

  // Hide welcome screen after first message
  document.getElementById("welcome").style.display = "none";

  addMessage(prompt, "user");
  textarea.value = "";

  const loadingMsg = document.createElement("div");
  loadingMsg.className = "message bot";
  loadingMsg.innerText = "Typing...";
  chat.appendChild(loadingMsg);

  try {
    const response = await puter.ai.chat(prompt);
    loadingMsg.innerText = response.message.content;
  } catch (err) {
    loadingMsg.innerText = "Error: " + err.message;
  }

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
