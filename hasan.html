<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Prompt App</title>
  <script src="https://js.puter.com/v2/"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      width: 500px;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }
    textarea {
      width: 100%;
      height: 100px;
      padding: 10px;
      border-radius: 5px;
      border: none;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #38bdf8;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    #output {
      margin-top: 15px;
      background: #020617;
      padding: 10px;
      border-radius: 5px;
      min-height: 100px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>AI Prompt Tool</h2>
  
  <textarea id="prompt" placeholder="Enter your prompt..."></textarea>
  
  <button onclick="runAI()">Generate</button>
  
  <div id="output">Response will appear here...</div>
</div>

<script>
async function runAI() {
  const prompt = document.getElementById("prompt").value;
  const output = document.getElementById("output");

  if (!prompt) {
    output.innerText = "Please enter a prompt.";
    return;
  }

  output.innerText = "Generating...";

  try {
    const response = await puter.ai.chat(prompt);
    output.innerText = response.message.content;
  } catch (error) {
    output.innerText = "Error: " + error.message;
  }
}
</script>

</body>
</html>
